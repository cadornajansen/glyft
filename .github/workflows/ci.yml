name: CI

on:
  push:
    branches: [main, feature/editor-polish]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: |
          mkdir -p .ci
          npm run lint 2>&1 | tee .ci/typecheck.log

      - name: Persist typecheck diagnostics
        if: steps.typecheck.outcome == 'failure' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ci/typecheck.log
          git diff --cached --quiet || git commit -m "ci: record typecheck errors"
          git push

      - name: Fail on typecheck errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Build
        run: npm run build
